name: CI

on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:
    branches:
      - main
      - 'claude/**'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder_anon_key

      - name: Verify dist/ exists
        run: |
          if [ ! -d "dist" ]; then
            echo "ERROR: dist/ directory not found after build"
            exit 1
          fi
          echo "dist/ exists — build succeeded"

  function-count:
    name: Check API Function Count
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Count API functions
        run: |
          COUNT=$(find api -maxdepth 1 -name "*.js" | wc -l)
          echo "API functions: $COUNT"
          if [ "$COUNT" -gt 12 ]; then
            echo "ERROR: $COUNT serverless functions exceed Vercel Hobby plan limit of 12"
            exit 1
          fi
          echo "OK: $COUNT/12 functions used"

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Scan for exposed secrets
        run: |
          WARN=0

          # Check for SUPABASE_SERVICE_KEY used outside process.env / import.meta.env patterns
          if grep -rn 'SUPABASE_SERVICE_KEY' src/ --include="*.js" --include="*.jsx" | \
             grep -v 'process\.env\.' | grep -v 'import\.meta\.env\.' | \
             grep -v '^\s*//' | grep -v '^\s*\*'; then
            echo "WARNING: SUPABASE_SERVICE_KEY referenced in src/ outside of env patterns"
            WARN=1
          fi

          # Check for ANTHROPIC_API_KEY used outside process.env / import.meta.env patterns
          if grep -rn 'ANTHROPIC_API_KEY' src/ --include="*.js" --include="*.jsx" | \
             grep -v 'process\.env\.' | grep -v 'import\.meta\.env\.' | \
             grep -v '^\s*//' | grep -v '^\s*\*'; then
            echo "WARNING: ANTHROPIC_API_KEY referenced in src/ outside of env patterns"
            WARN=1
          fi

          # Check for TWILIO_AUTH_TOKEN used outside process.env / import.meta.env patterns
          if grep -rn 'TWILIO_AUTH_TOKEN' src/ --include="*.js" --include="*.jsx" | \
             grep -v 'process\.env\.' | grep -v 'import\.meta\.env\.' | \
             grep -v '^\s*//' | grep -v '^\s*\*'; then
            echo "WARNING: TWILIO_AUTH_TOKEN referenced in src/ outside of env patterns"
            WARN=1
          fi

          if [ "$WARN" -eq 0 ]; then
            echo "No exposed secrets detected in src/"
          else
            echo "Secret scan warnings found — review the output above (not failing CI)"
          fi
          # Warn but don't fail — secrets may appear in comments or docs
          exit 0

  env-vars:
    name: Document Required Env Vars
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: List required environment variables
        run: |
          echo "=== Required Vercel Environment Variables ==="
          echo ""
          echo "--- Server-side (api/*.js) ---"
          grep -roh 'process\.env\.[A-Z_]*' api/ --include="*.js" | \
            sed 's/process\.env\.//' | sort -u | while read v; do
              echo "  $v"
            done
          echo ""
          echo "--- Browser (src/) — must be prefixed VITE_ ---"
          grep -roh 'import\.meta\.env\.[A-Z_]*' src/ --include="*.js" --include="*.jsx" | \
            sed 's/import\.meta\.env\.//' | sort -u | while read v; do
              echo "  $v"
            done
          echo ""
          echo "See .env.example for descriptions and defaults."
