<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gateway CRM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        document.getElementById('root').innerHTML =
          '<div style="padding:40px;font-family:sans-serif;max-width:600px;margin:auto">' +
          '<h2 style="color:#c0392b;font-family:serif">Gateway CRM — Startup Error</h2>' +
          '<p style="color:#333">' + msg + '</p>' +
          '<pre style="font-size:11px;color:#666;white-space:pre-wrap">' + (err && err.stack || '') + '</pre>' +
          '<p style="font-size:12px;color:#999">Check Vercel environment variables: VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY</p>' +
          '</div>';
        return true;
      };
    </script>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
